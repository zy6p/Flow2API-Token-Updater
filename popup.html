<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow2API Token Updater</title>
    <style>
        :root {
            --ink: #1e2330;
            --muted: #5c6474;
            --line: rgba(26, 35, 50, 0.12);
            --card: rgba(255, 255, 255, 0.88);
            --accent: #0f766e;
            --accent-strong: #115e59;
            --accent-soft: rgba(15, 118, 110, 0.12);
            --warn: #b45309;
            --warn-soft: rgba(180, 83, 9, 0.12);
            --danger: #b42318;
            --danger-soft: rgba(180, 35, 24, 0.12);
            --surface: linear-gradient(180deg, #f3efe5 0%, #eef3f4 46%, #f7f8fb 100%);
        }

        * {
            box-sizing: border-box;
        }

        body {
            width: 368px;
            margin: 0;
            padding: 18px;
            font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top right, rgba(15, 118, 110, 0.16), transparent 34%),
                radial-gradient(circle at bottom left, rgba(180, 83, 9, 0.08), transparent 28%),
                var(--surface);
        }

        .shell {
            border: 1px solid rgba(255, 255, 255, 0.75);
            background: var(--card);
            backdrop-filter: blur(18px);
            border-radius: 20px;
            padding: 18px;
            box-shadow: 0 16px 40px rgba(27, 39, 51, 0.14);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(15, 118, 110, 0.12);
            color: var(--muted);
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 14px 0 8px;
            font-size: 24px;
            line-height: 1.1;
            font-weight: 680;
        }

        .subtitle {
            margin: 0 0 18px;
            font-size: 13px;
            line-height: 1.55;
            color: var(--muted);
        }

        .field {
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 650;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--muted);
        }

        input[type="text"] {
            width: 100%;
            border: 1px solid rgba(30, 35, 48, 0.12);
            border-radius: 14px;
            padding: 13px 14px;
            font-size: 14px;
            font-family: inherit;
            color: var(--ink);
            background: rgba(255, 255, 255, 0.9);
            transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: rgba(15, 118, 110, 0.35);
            box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
            transform: translateY(-1px);
        }

        .hint {
            margin-top: 8px;
            font-size: 12px;
            line-height: 1.5;
            color: var(--muted);
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 14px;
        }

        button {
            border: none;
            border-radius: 14px;
            padding: 12px 14px;
            font-size: 14px;
            font-weight: 650;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .btn-primary {
            color: white;
            background: linear-gradient(135deg, var(--accent) 0%, #147d74 100%);
            box-shadow: 0 10px 22px rgba(15, 118, 110, 0.26);
        }

        .btn-plain {
            width: 100%;
            margin-top: 10px;
            color: var(--muted);
            background: transparent;
            border: 1px dashed rgba(30, 35, 48, 0.12);
        }

        .status {
            display: none;
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-line;
        }

        .status.info {
            color: #0f4c81;
            background: rgba(15, 118, 110, 0.08);
            border: 1px solid rgba(15, 118, 110, 0.14);
        }

        .status.success {
            color: var(--accent-strong);
            background: var(--accent-soft);
            border: 1px solid rgba(15, 118, 110, 0.16);
        }

        .status.error {
            color: var(--danger);
            background: var(--danger-soft);
            border: 1px solid rgba(180, 35, 24, 0.14);
        }

        .summary {
            margin-top: 18px;
            border-radius: 18px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.74);
            border: 1px solid rgba(30, 35, 48, 0.08);
        }

        .summary-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .summary-title {
            font-size: 14px;
            font-weight: 700;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: 650;
        }

        .chip.connected {
            color: var(--accent-strong);
            background: var(--accent-soft);
        }

        .chip.waiting {
            color: var(--warn);
            background: var(--warn-soft);
        }

        .chip.warning {
            color: var(--danger);
            background: var(--danger-soft);
        }

        .facts {
            display: grid;
            gap: 10px;
        }

        .fact {
            display: grid;
            gap: 4px;
        }

        .fact-label {
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .fact-value {
            font-size: 13px;
            line-height: 1.45;
            color: var(--ink);
            word-break: break-word;
        }

        .browser-hint {
            margin-top: 14px;
            font-size: 12px;
            line-height: 1.55;
            color: var(--muted);
        }

        .busy .shell {
            opacity: 0.94;
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="eyebrow">Flow2API Auto Sync</div>
        <h1>只填一个 Base URL</h1>
        <p class="subtitle">
            扩展会自动读取已登录的 Flow2API 控制台配置，并把当前浏览器 profile 的 Google Labs 登录态同步过去。
        </p>

        <div class="field">
            <label for="baseUrl">Flow2API Base URL</label>
            <input
                type="text"
                id="baseUrl"
                placeholder="https://your-flow2api.example.com"
                autocomplete="off"
                spellcheck="false">
            <div class="hint">
                只填控制台地址。若当前浏览器已登录该站点，扩展会自动读取插件连接配置，不再要求你手动复制接口地址或 Token。
            </div>
        </div>

        <div class="actions">
            <button class="btn-primary" id="connectBtn">连接 Flow2API</button>
        </div>

        <button class="btn-plain" id="consoleBtn">前往 Flow2API 控制台</button>

        <div class="status" id="status"></div>

        <div class="summary">
            <div class="summary-head">
                <div class="summary-title">当前状态</div>
                <div class="chip waiting" id="connectionChip">等待连接</div>
            </div>

            <div class="facts">
                <div class="fact">
                    <div class="fact-label">Flow2API</div>
                    <div class="fact-value" id="summaryBaseUrl">未设置</div>
                </div>
                <div class="fact">
                    <div class="fact-label">当前账号</div>
                    <div class="fact-value" id="summaryEmail">等待识别</div>
                </div>
                <div class="fact">
                    <div class="fact-label">Token 到期</div>
                    <div class="fact-value" id="summaryExpires">未获取</div>
                </div>
                <div class="fact">
                    <div class="fact-label">上次同步</div>
                    <div class="fact-value" id="summaryLastSync">未获取</div>
                </div>
                <div class="fact">
                    <div class="fact-label">同步反馈</div>
                    <div class="fact-value" id="summaryMessage">填入 Base URL 后，扩展会自动读取控制台配置并同步。</div>
                </div>
            </div>

            <div class="browser-hint" id="browserHint">
                当前浏览器会监听 Google Labs 登录态变化，并自动同步。
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
